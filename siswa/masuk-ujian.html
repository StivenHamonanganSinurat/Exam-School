<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXALAB - Masuk Ujian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .container { width: 100%; max-width: 440px; }
        .card { background: white; border-radius: 20px; padding: 32px 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); text-align: center; }

        .back-link { display: inline-block; font-size: 13px; color: #64748b; text-decoration: none; margin-bottom: 24px; }
        .back-link:hover { color: #4f46e5; }

        .icon-big { font-size: 56px; margin-bottom: 12px; }
        h1 { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

        .method-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .method-tab { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; cursor: pointer; text-align: center; font-weight: 600; font-size: 13px; transition: all 0.2s; color: #64748b; }
        .method-tab:hover { border-color: #a5b4fc; }
        .method-tab.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .method-tab .icon { font-size: 24px; display: block; margin-bottom: 4px; }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 14px 16px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 18px; font-family: inherit; text-align: center; letter-spacing: 4px; font-weight: 700; color: #1e293b; transition: all 0.2s; }
        .form-group input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .form-group input::placeholder { letter-spacing: 1px; font-weight: 400; font-size: 14px; color: #cbd5e1; }

        .btn-masuk { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-masuk:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.3); }

        .qr-placeholder { background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 14px; padding: 30px; text-align: center; color: #94a3b8; }
        .qr-placeholder .icon { font-size: 48px; margin-bottom: 8px; }

        .demo-info { margin-top: 16px; padding: 10px; background: #fefce8; border-radius: 8px; }
        .demo-info p { font-size: 11px; color: #ca8a04; font-weight: 600; }

        .hidden { display: none; }

        @media (max-width: 400px) { .card { padding: 20px 16px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <a href="dashboard.html" class="back-link">← Kembali ke Dashboard</a>
            <div class="icon-big">🔢</div>
            <h1>Masuk Ujian</h1>
            <p class="subtitle">Masukkan kode ujian dari guru atau scan QR</p>

            <!-- TABS -->
            <div class="method-tabs">
                <div class="method-tab active" onclick="switchTab('kode')">
                    <span class="icon">⌨️</span> Kode Ujian
                </div>
                <div class="method-tab" onclick="switchTab('qr')">
                    <span class="icon">📷</span> Scan QR
                </div>
            </div>

            <!-- INPUT KODE -->
            <div id="tabKode">
                <div class="form-group">
                    <label>Kode Ujian</label>
                    <input type="text" id="kodeUjian" placeholder="Masukkan 6 digit kode" maxlength="6" oninput="this.value = this.value.toUpperCase()">
                </div>
                <button class="btn-masuk" onclick="masukUjian()">🔐 Masuk Ujian</button>
            </div>

            <!-- SCAN QR -->
            <div id="tabQR" class="hidden">
                <div class="qr-placeholder">
                    <div class="icon">📷</div>
                    <p style="font-weight:600;">Arahkan kamera ke QR Code</p>
                    <p style="font-size:12px;">dari proyektor / layar guru</p>
                </div>
                <p style="font-size:11px;color:#94a3b8;margin-top:8px;">🔶 Demo: Scan tidak berfungsi, gunakan kode manual</p>
            </div>

            <div class="demo-info">
                <p>🔶 DEMO: Ketik kode apa saja (6 karakter) lalu klik Masuk</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.method-tab').classList.add('active');
            document.getElementById('tabKode').classList.toggle('hidden', tab !== 'kode');
            document.getElementById('tabQR').classList.toggle('hidden', tab !== 'qr');
        }

        function masukUjian() {
            const kode = document.getElementById('kodeUjian').value.trim();
            if (kode.length < 4) {
                alert('⚠️ Masukkan kode ujian minimal 4 karakter!');
                return;
            }
            // Redirect ke konfirmasi
            window.location.href = 'konfirmasi-ujian.html?kode=' + encodeURIComponent(kode);
        }

        // Enter key untuk submit
        document.getElementById('kodeUjian').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') masukUjian();
        });
    </script>

</body>
</html>
